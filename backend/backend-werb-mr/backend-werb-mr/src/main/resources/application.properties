spring.application.name=backend-werb-mr
server.port=${PORT:8080}
spring.datasource.url=${SPRING_DATASOURCE_URL:${DB_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:postgres}}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER:${PGUSER:postgres}}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:${PGPASSWORD:}}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
app.jwt.secret=${JWT_SECRET:clave-super-secreta-para-firmar-tokens-jwt-de-desarrollo}
app.jwt.expiracion-ms=${JWT_EXPIRACION_MS:86400000}
app.admin.nombre=${ADMIN_NOMBRE:Cristhian David}
app.admin.correo=${ADMIN_CORREO:cristhian.david@admin.com}
app.admin.contrasena=${ADMIN_CONTRASENA:Cdol1122@}
